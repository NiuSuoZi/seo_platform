    $(function(){

    })

	$("#sys-clear-cache").on("click",function(){
		$.get("{:U('platform/index/clear')}",function(res){
			if(res.code === 200){
				layui.use(function() {
					var layer = layui.layer;
					var util = layui.util;
					// 事件

					layer.alert(res.message, {icon: 1}, function(index){
						window.location.reload();
						layer.close(index);
					});
				})
			}
		})
	})
